name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Peal
        uses: actions/checkout@v4
        with:
          path: peal

      - name: "Checkout Hudson (file deps)"
        uses: actions/checkout@v4
        with:
          repository: arach/hudson
          path: hudson

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Get pnpm store directory
        shell: bash
        working-directory: peal
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('peal/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: "Build Hudson packages (linked file deps)"
        working-directory: hudson
        run: |
          bun install --frozen-lockfile
          bun run --filter @hudsonkit/ai build
          bun run --filter hudsonkit build

      - name: Install dependencies
        working-directory: peal
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: peal
        run: pnpm run build:static
        env:
          NEXT_PUBLIC_BASE_PATH: /peal

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: peal/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4